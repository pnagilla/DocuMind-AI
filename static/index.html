<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocuMind AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <div class="app-layout">

    <!-- Left Sidebar -->
    <aside class="sidebar">

      <!-- Logo -->
      <div class="sidebar-logo">
        <img src="/static/logo.svg" alt="DocuMind AI" class="logo-img" />
        <span class="logo">DocuMind AI</span>
      </div>

      <!-- Upload -->
      <div class="sidebar-section">
        <h2 class="panel-title">Upload Document</h2>
        <div class="drop-zone" id="dropZone">
          <div class="drop-icon">📄</div>
          <p class="drop-text">Drag & drop a PDF here</p>
          <p class="drop-or">— or —</p>
          <label class="upload-btn" for="fileInput">Browse File</label>
          <input type="file" id="fileInput" accept=".pdf" hidden />
        </div>
        <div id="uploadStatus" class="upload-status hidden"></div>
      </div>

      <!-- Documents -->
      <div class="sidebar-section sidebar-docs">
        <h2 class="panel-title">Your Documents</h2>
        <ul id="documentList" class="document-list">
          <li class="empty-state">No documents uploaded yet</li>
        </ul>
      </div>

      <!-- Profile (pinned to bottom) -->
      <div class="profile-section" id="profileSection">
        <div class="profile-avatar" id="profileAvatar"></div>
        <div class="profile-info">
          <span class="profile-name" id="profileName"></span>
          <span class="profile-role">Member</span>
        </div>
        <svg class="profile-chevron" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="18 15 12 9 6 15"/>
        </svg>

        <!-- Dropdown -->
        <div class="profile-dropdown hidden" id="profileDropdown">
          <div class="dropdown-header">
            <span class="dropdown-username" id="dropdownUsername"></span>
            <span class="dropdown-email">Member</span>
          </div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Profile
          </button>
          <button class="dropdown-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Settings
          </button>
          <button class="dropdown-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Help
          </button>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item danger" id="logoutBtn">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Log out
          </button>
        </div>
      </div>

    </aside>

    <!-- Main content -->
    <main class="main-content">

      <!-- Header -->
      <header class="topbar">
        <div class="topbar-left">
          <h2 class="topbar-title">Chat</h2>
          <span id="scopeLabel" class="scope-label">All documents</span>
        </div>
        <p class="topbar-tagline">Upload a PDF and ask questions about it</p>
      </header>

      <!-- Messages -->
      <div class="messages" id="messages">
        <div class="message assistant">
          <div class="bubble-wrapper">
            <div class="bubble">
              Hello! Upload a PDF on the left, then ask me anything about it.
            </div>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="chat-input-area">
        <input
          type="text"
          id="questionInput"
          placeholder="Ask a question about your documents..."
          autocomplete="off"
        />
        <button id="sendBtn">Send</button>
      </div>

    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>

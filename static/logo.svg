<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)"/>

  <!-- Soft glow in center -->
  <circle cx="100" cy="95" r="60" fill="url(#glowGrad)"/>

  <!-- Orbiting ring -->
  <ellipse cx="100" cy="100" rx="78" ry="22" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>

  <!-- Brain shape made of connected nodes -->

  <!-- Central node -->
  <circle cx="100" cy="90" r="10" fill="#a78bfa" filter="url(#glow)"/>

  <!-- Surrounding nodes -->
  <circle cx="68"  cy="72"  r="7" fill="#818cf8" filter="url(#glow)"/>
  <circle cx="132" cy="72"  r="7" fill="#818cf8" filter="url(#glow)"/>
  <circle cx="58"  cy="100" r="6" fill="#6366f1" filter="url(#glow)"/>
  <circle cx="142" cy="100" r="6" fill="#6366f1" filter="url(#glow)"/>
  <circle cx="72"  cy="120" r="6" fill="#818cf8" filter="url(#glow)"/>
  <circle cx="128" cy="120" r="6" fill="#818cf8" filter="url(#glow)"/>
  <circle cx="100" cy="128" r="7" fill="#a78bfa" filter="url(#glow)"/>

  <!-- Connections between nodes -->
  <g stroke="#c4b5fd" stroke-width="1.5" opacity="0.6">
    <line x1="100" y1="90"  x2="68"  y2="72"/>
    <line x1="100" y1="90"  x2="132" y2="72"/>
    <line x1="100" y1="90"  x2="58"  y2="100"/>
    <line x1="100" y1="90"  x2="142" y2="100"/>
    <line x1="100" y1="90"  x2="72"  y2="120"/>
    <line x1="100" y1="90"  x2="128" y2="120"/>
    <line x1="100" y1="90"  x2="100" y2="128"/>
    <line x1="68"  y1="72"  x2="58"  y2="100"/>
    <line x1="132" y1="72"  x2="142" y2="100"/>
    <line x1="58"  y1="100" x2="72"  y2="120"/>
    <line x1="142" y1="100" x2="128" y2="120"/>
    <line x1="72"  y1="120" x2="100" y2="128"/>
    <line x1="128" y1="120" x2="100" y2="128"/>
    <line x1="68"  y1="72"  x2="132" y2="72"/>
  </g>

  <!-- Small pulse dots on connections -->
  <circle cx="84"  cy="81"  r="2.5" fill="#e879f9" opacity="0.9"/>
  <circle cx="121" cy="95"  r="2.5" fill="#e879f9" opacity="0.9"/>
  <circle cx="86"  cy="113" r="2.5" fill="#e879f9" opacity="0.9"/>

  <!-- Letter D subtly in center -->
  <text x="100" y="95" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, serif" font-size="13" font-weight="bold"
        fill="#ffffff" opacity="0.85" filter="url(#glow)">D</text>

</svg>

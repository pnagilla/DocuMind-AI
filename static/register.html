<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — DocuMind AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo-row">
        <img src="/static/logo.svg" alt="DocuMind AI" class="auth-logo-img"/>
        <h1 class="auth-logo">DocuMind AI</h1>
      </div>
      <p class="auth-subtitle">Create your account</p>

      <div id="authError" class="auth-error hidden"></div>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Choose a username" autocomplete="username" required/>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" required/>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter your password" autocomplete="new-password" required/>
        </div>
        <button type="submit" class="auth-btn" id="submitBtn">Create Account</button>
      </form>

      <p class="auth-switch">
        Already have an account? <a href="/login">Sign in</a>
      </p>
    </div>
  </div>

  <script>
    if (localStorage.getItem('token')) window.location.href = '/';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('authError');
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        errorDiv.textContent = 'Passwords do not match.';
        errorDiv.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';
      errorDiv.classList.add('hidden');

      try {
        const res = await fetch('/api/v1/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: password,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          errorDiv.textContent = data.detail || 'Registration failed.';
          errorDiv.classList.remove('hidden');
        } else {
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('username', data.username);
          window.location.href = '/';
        }
      } catch {
        errorDiv.textContent = 'Could not reach the server.';
        errorDiv.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
